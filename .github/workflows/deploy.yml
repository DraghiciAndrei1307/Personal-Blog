name: Deploy Workflow
on:
  push:
    branches:
      - main
      - dev
      - test
  pull_request:
    branches:
      - main
      - dev
      - test
jobs:
  test:
    runs-on: ubuntu-latest
    environment: Personal-Blog-Environment
    env:
      FLASK_KEY: ${{ secrets.FLASK_KEY }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: Create virtual environment
        run: | 
          python3 -m venv .venv
          source .venv/bin/activate
      - name: Install depencencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest -v tests/unit/
          pytest -v tests/functional
      - name: Run the app
        run: |
          nohup python3 main.py & sleep 5
      - name: Perform health check (the app is up and running; the process did not crash)
        run: |
          curl -f http://127.0.0.1:5000/
