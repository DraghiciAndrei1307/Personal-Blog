{% include "header.html" %}

<!-- Page Header-->
<header class="masthead" style="background-image: url('{{post.img_url}}')">
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="post-heading">
          <h1>{{ career_entry.organization_name }}</h1>
          <h2 class="subheading">{{ career_entry.role }}</h2>
          <span class="meta">
            Start: {{ career_entry.start_date }}<br>
            End: {{ career_entry.end_date }}
          </span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Post Content -->
<article>
  <div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        {{ career_entry.activity|safe }}
        {% if current_user.get_id() == '1' %}
          <div class="d-flex justify-content-end mb-4">
            <a
              class="btn btn-primary float-right"
              href="{{url_for('edit_career_entry', career_entry_id=career_entry.id)}}"
              >Edit Career Entry</a
            >
          </div>
        {% endif %}

      </div>
    </div>
  </div>
</article>

{% include "footer.html" %}
